<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Task Manager</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #f5f4f0;
      color: #1a1a1a;
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    #app { max-width: 580px; margin: 0 auto; }

    h1 { font-size: 28px; font-weight: 600; margin-bottom: 4px; }

    .subtitle { font-size: 14px; color: #888; margin-bottom: 1.5rem; }

    .add-row { display: flex; gap: 8px; margin-bottom: 1.5rem; }

    .add-row input {
      flex: 1;
      padding: 10px 14px;
      border: 1px solid #ddd;
      border-radius: 10px;
      font-size: 14px;
      background: #fff;
      color: #1a1a1a;
      outline: none;
      transition: border-color 0.15s;
    }

    .add-row input:focus { border-color: #888; }

    .add-row button {
      padding: 10px 18px;
      border: 1px solid #ddd;
      border-radius: 10px;
      background: #fff;
      color: #1a1a1a;
      font-size: 14px;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s;
    }

    .add-row button:hover { background: #eee; }
    .add-row button:disabled { opacity: 0.5; cursor: not-allowed; }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-bottom: 1.5rem;
    }

    .stat {
      background: #fff;
      border-radius: 10px;
      padding: 14px;
      text-align: center;
      border: 1px solid #e8e8e8;
    }

    .stat-num { font-size: 26px; font-weight: 600; color: #1a1a1a; }
    .stat-label { font-size: 11px; color: #999; margin-top: 2px; text-transform: uppercase; letter-spacing: 0.05em; }

    .filters { display: flex; gap: 6px; margin-bottom: 1rem; }

    .filter-btn {
      padding: 5px 14px;
      border-radius: 99px;
      border: 1px solid #ddd;
      font-size: 12px;
      cursor: pointer;
      background: #fff;
      color: #888;
      transition: all 0.15s;
    }

    .filter-btn.active { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }

    .status-bar {
      font-size: 11px;
      text-align: right;
      margin-bottom: 0.5rem;
      height: 16px;
      transition: opacity 0.4s;
    }

    .status-bar.success { color: #1D9E75; }
    .status-bar.error { color: #e24b4a; }

    .task-list { display: flex; flex-direction: column; gap: 6px; }

    .task-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 13px 14px;
      background: #fff;
      border: 1px solid #e8e8e8;
      border-radius: 10px;
      transition: opacity 0.2s;
    }

    .task-item.done { opacity: 0.5; }
    .task-item:hover { border-color: #ccc; }

    .check-btn {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      border: 1.5px solid #ccc;
      background: #f5f5f5;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 11px;
      transition: all 0.15s;
    }

    .check-btn.checked { background: #1D9E75; border-color: #1D9E75; color: #fff; }

    .task-text { flex: 1; font-size: 14px; color: #1a1a1a; }
    .task-item.done .task-text { text-decoration: line-through; color: #bbb; }

    .del-btn {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      border: none;
      background: transparent;
      color: #ccc;
      cursor: pointer;
      font-size: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: all 0.15s;
    }

    .task-item:hover .del-btn { opacity: 1; }
    .del-btn:hover { color: #e24b4a; background: #fef2f2; }

    .empty { text-align: center; padding: 3rem 1rem; color: #bbb; font-size: 14px; }

    .loading { text-align: center; padding: 3rem 1rem; color: #bbb; font-size: 14px; }
  </style>
</head>
<body>
  <div id="app">
    <h1>My Tasks</h1>
    <p class="subtitle">Keep track of what needs to get done.</p>

    <div class="add-row">
      <input type="text" id="task-input" placeholder="Add a new task..." />
      <button id="add-btn" onclick="addTask()">+ Add</button>
    </div>

    <div class="stats">
      <div class="stat"><div class="stat-num" id="stat-total">0</div><div class="stat-label">Total</div></div>
      <div class="stat"><div class="stat-num" id="stat-open">0</div><div class="stat-label">To do</div></div>
      <div class="stat"><div class="stat-num" id="stat-done">0</div><div class="stat-label">Done</div></div>
    </div>

    <div class="filters">
      <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
      <button class="filter-btn" onclick="setFilter('open', this)">To do</button>
      <button class="filter-btn" onclick="setFilter('done', this)">Done</button>
    </div>

    <div class="status-bar" id="status-bar"></div>
    <div class="task-list" id="task-list"><div class="loading">Loading your tasks...</div></div>
  </div>

  <script>
    const SUPABASE_URL = 'https://lorbqbgwdshzqdtiqygi.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxvcmJxYmd3ZHNoenFkdGlxeWdpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyMjc2NzcsImV4cCI6MjA5MDgwMzY3N30.Dq98qNp0byf0vtva1uZrGgPmWrXqobt7C47GexISHR8';

    const { createClient } = supabase;
    const db = createClient(SUPABASE_URL, SUPABASE_KEY);

    let tasks = [];
    let filter = 'all';

    function showStatus(msg, type = 'success') {
      const bar = document.getElementById('status-bar');
      bar.textContent = msg;
      bar.className = 'status-bar ' + type;
      bar.style.opacity = '1';
      setTimeout(() => { bar.style.opacity = '0'; }, 2000);
    }

    function setFilter(f, btn) {
      filter = f;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render();
    }

    async function loadTasks() {
      const { data, error } = await db.from('tasks').select('*').order('created_at', { ascending: true });
      if (error) { showStatus('Could not load tasks', 'error'); return; }
      tasks = data;
      render();
    }

    async function addTask() {
      const input = document.getElementById('task-input');
      const text = input.value.trim();
      if (!text) return;

      const btn = document.getElementById('add-btn');
      btn.disabled = true;
      input.value = '';

      const { data, error } = await db.from('tasks').insert([{ text, done: false }]).select();
      if (error) {
        showStatus('Could not add task', 'error');
      } else {
        tasks.push(data[0]);
        showStatus('✓ Task added');
        render();
      }
      btn.disabled = false;
    }

    async function toggleTask(id) {
      const t = tasks.find(t => t.id === id);
      if (!t) return;
      const { error } = await db.from('tasks').update({ done: !t.done }).eq('id', id);
      if (error) { showStatus('Could not update task', 'error'); return; }
      t.done = !t.done;
      showStatus('✓ Saved');
      render();
    }

    async function deleteTask(id) {
      const { error } = await db.from('tasks').delete().eq('id', id);
      if (error) { showStatus('Could not delete task', 'error'); return; }
      tasks = tasks.filter(t => t.id !== id);
      showStatus('✓ Deleted');
      render();
    }

    function render() {
      const total = tasks.length;
      const done = tasks.filter(t => t.done).length;
      document.getElementById('stat-total').textContent = total;
      document.getElementById('stat-open').textContent = total - done;
      document.getElementById('stat-done').textContent = done;

      const visible = tasks.filter(t => {
        if (filter === 'open') return !t.done;
        if (filter === 'done') return t.done;
        return true;
      });

      const list = document.getElementById('task-list');
      if (visible.length === 0) {
        list.innerHTML = '<div class="empty">No tasks here yet.</div>';
        return;
      }

      list.innerHTML = visible.map(t => `
        <div class="task-item ${t.done ? 'done' : ''}">
          <button class="check-btn ${t.done ? 'checked' : ''}" onclick="toggleTask(${t.id})">${t.done ? '✓' : ''}</button>
          <span class="task-text">${t.text}</span>
          <button class="del-btn" onclick="deleteTask(${t.id})">✕</button>
        </div>
      `).join('');
    }

    document.getElementById('task-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') addTask();
    });

    loadTasks();
  </script>
</body>
</html>
